root = "."
tmp_dir = "tmp"

[build]
  # Sadece belirlediğimiz dosyalar değiştiğinde Go yeniden derlensin
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["assets", "tmp", "vendor"]
  
  # ÇOK ÖNEMLİ: Veritabanı dosyaları (.cognitive) izlenmemeli! 
  # Yoksa sisteme her yeni yazı/ses kaydettiğinizde dosya değiştiği için sunucu restart atar.
  exclude_file = ["main_db.cognitive"]
  exclude_regex = ["_test.go", ".*\\.cognitive$"]
  
  # Derleme komutu (-v detaylı çıktı için)
  cmd = "go build -v -o ./tmp/main ."
  
  # Çalıştırılacak çıktı
  bin = "./tmp/main"
  
  delay = 1000 # 1 saniye bekleme

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"
